services:
  - type: web
    name: dealership-tool-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: DEALER_DB_PATH
        value: /var/data/dealership.db
      - key: DEALER_TIMEZONE
        value: America/Chicago
      - key: DEALER_ADMIN_USERNAME
        sync: false
      - key: DEALER_ADMIN_PASSWORD
        sync: false
      - key: DEALER_CORS_ORIGINS
        sync: false
      - key: DEALER_APP_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: BDC_NOTIFY_EMAIL_FROM
        sync: false
      - key: BDC_NOTIFY_EMAIL_REPLY_TO
        sync: false
    disk:
      name: dealership-data
      mountPath: /var/data
      sizeGB: 5

  - type: web
    name: dealership-tool-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_TRAFFIC_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
